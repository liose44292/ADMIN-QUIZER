<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quizer Admin Leaderboard</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #1a0000 0%, #000000 100%);
  color: #ffffff;
  font-family: 'Segoe UI', Arial, sans-serif;
  text-align: center;
  min-height: 100vh;
}

#date {
  font-size: 24px;
  margin-top: 15px;
  color: #ff3333;
  font-weight: bold;
  letter-spacing: 1px;
}

#timer {
  font-size: 48px;
  margin: 10px 0 20px 0;
  font-weight: 900;
  color: #ffffff;
  text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
}

#status-msg {
  font-size: 42px;
  margin: 15px 0 25px 0;
  font-weight: 900;
  color: #ff0000;
  letter-spacing: 2px;
  text-shadow: 0 0 15px rgba(255, 0, 0, 0.8);
  animation: pulse 1.5s infinite alternate;
  display: none;
}

@keyframes pulse {
  0% { transform: scale(0.98); opacity: 0.8; }
  100% { transform: scale(1.02); opacity: 1; }
}

/* Base Wrapper holding all rows */
#content {
  display: flex;
  flex-direction: column;
  gap: 30px;
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
}

/* Container for each group row - explicitly locks to 3 columns max */
.session-group {
  width: 100%;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  position: relative;
  padding-bottom: 25px;
}

/* The solid partition line drawn below historical session groups */
.session-group.line-drawn::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 4px;
  background: #ff0000;
  box-shadow: 0 0 12px #ff0000;
  border-radius: 2px;
}

.card {
  background: linear-gradient(135deg, #1f0505 0%, #0d0000 100%);
  padding: 20px;
  border-radius: 12px;
  font-size: 22px;
  border: 1px solid #400000;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  box-sizing: border-box;
}

.gold { border-color: #ffd700; }
.gold b { color: #ffd700; text-shadow: 0 0 5px rgba(255,215,0,0.3); }
.silver { border-color: #c0c0c0; }
.silver b { color: #c0c0c0; text-shadow: 0 0 5px rgba(192,192,192,0.3); }
.bronze { border-color: #cd7f32; }
.bronze b { color: #cd7f32; text-shadow: 0 0 5px rgba(205,127,50,0.3); }
.normal { border-color: #331010; }

#admin-controls {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 10005;
}

#clear-btn {
  background: #ff0000;
  color: #fff;
  border: 2px solid #400000;
  padding: 15px 30px;
  font-size: 20px;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
}

#clear-btn:hover { background: #cc0000; }

#popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #ff0000;
  color: white;
  padding: 40px 60px;
  font-size: 40px;
  font-weight: bold;
  display: none;
  border-radius: 15px;
  box-shadow: 0 0 30px rgba(255,0,0,0.8);
  z-index: 10000;
}
</style>
</head>

<body>

<div id="date"></div>
<div id="timer"></div>
<div id="status-msg">GAME WILL START SOON</div>

<div id="content"></div>

<div id="admin-controls">
  <button id="clear-btn">CLEAR</button>
</div>

<div id="popup">RESET!</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue, set, get, remove } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCcCjs7M6vFbJzLvYvZfddmEIsCzPPG3jE",
  authDomain: "quizer-project.firebaseapp.com",
  databaseURL: "https://quizer-project-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "quizer-project",
  storageBucket: "quizer-project.firebasestorage.app",
  messagingSenderId: "401652926555",
  appId: "1:401652926555:web:09e9b859638facefcd577e",
  measurementId: "G-D1D4LK2XRT"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let currentHistory = {};
let currentActive = {};

onAuthStateChanged(auth, (u) => {
  if(!u) location.href = "index.html";
});

function updateTimeAndSchedule() {
  let now = new Date();
  document.getElementById("date").innerText = now.toLocaleDateString() + " " + now.toLocaleTimeString();

  let hrs = now.getHours();
  let timerEl = document.getElementById("timer");
  let statusEl = document.getElementById("status-msg");

  if (hrs >= 7 && hrs < 13) {
    statusEl.style.display = "none";
    timerEl.style.display = "block";
    let target = new Date(now).setHours(13, 0, 0, 0);
    let diff = target - now;
    let h = Math.floor(diff / 1000 / 60 / 60);
    let m = Math.floor((diff / 1000 / 60) % 60);
    timerEl.innerText = `${h}H:${m}M LEFT`;
  } 
  else if (hrs >= 13 && hrs < 14) {
    timerEl.style.display = "none";
    statusEl.style.display = "block";
  } 
  else if (hrs >= 14 && hrs < 20) {
    statusEl.style.display = "none";
    timerEl.style.display = "block";
    let target = new Date(now).setHours(20, 0, 0, 0);
    let diff = target - now;
    let h = Math.floor(diff / 1000 / 60 / 60);
    let m = Math.floor((diff / 1000 / 60) % 60);
    timerEl.innerText = `${h}H:${m}M LEFT`;
  } 
  else {
    timerEl.style.display = "none";
    statusEl.style.display = "block";
  }
}
setInterval(updateTimeAndSchedule, 1000);
updateTimeAndSchedule();

const content = document.getElementById("content");
const clearBtn = document.getElementById("clear-btn");
const popup = document.getElementById("popup");

// Master drawing function combining global elements locally
function rebuildDisplay() {
  content.innerHTML = "";

  // 1. Process and Render Past Sessions Chronologically
  const sortedHistoryKeys = Object.keys(currentHistory).sort((a, b) => parseInt(a) - parseInt(b));
  
  sortedHistoryKeys.forEach(ts => {
    const historicalSession = currentHistory[ts] || {};
    let histArr = [];
    for (let id in historicalSession) {
      histArr.push({
        name: historicalSession[id].name || "Player",
        score: historicalSession[id].score,
        time: historicalSession[id].timestamp
      });
    }
    histArr.sort((a, b) => b.score - a.score);
    const historicalTopThree = histArr.slice(0, 3);

    if (historicalTopThree.length > 0) {
      createGroupRow(historicalTopThree, true);
    }
  });

  // 2. Process and Render Live Top 3 System below history layout borders
  let liveArr = [];
  for (let uid in currentActive) {
    liveArr.push({
      name: currentActive[uid].name || "Player",
      score: currentActive[uid].score,
      time: currentActive[uid].timestamp
    });
  }
  liveArr.sort((a, b) => b.score - a.score);
  const liveTopThree = liveArr.slice(0, 3);

  if (liveTopThree.length > 0) {
    createGroupRow(liveTopThree, false);
  } else if (sortedHistoryKeys.length === 0) {
    content.innerHTML = `<div style="font-size:22px; color:#802020; padding:40px;">No Active Live Leaderboard Entries</div>`;
  }
}

// Generates a structural row holding exactly 3 items horizontally side-by-side
function createGroupRow(playersList, drawRedLine) {
  const rowContainer = document.createElement("div");
  rowContainer.className = "session-group";
  if (drawRedLine) {
    rowContainer.classList.add("line-drawn");
  }

  // Ensure maximum of 3 cards fill up to 3 explicit layout blocks
  playersList.forEach((p, i) => {
    let cls = "normal";
    if (i === 0) cls = "gold";
    if (i === 1) cls = "silver";
    if (i === 2) cls = "bronze";

    let dateStr = new Date(p.time).toLocaleString();
    let div = document.createElement("div");
    div.className = "card " + cls;
    div.innerHTML = `<b>${i + 1}. ${p.name}</b><br>Score: ${p.score}<br><small style="font-size:14px; opacity:0.5;">${dateStr}</small>`;
    rowContainer.appendChild(div);
  });

  content.appendChild(rowContainer);
}

// ✅ ISOLATED STORAGE STREAM 1: Tracks only historic saved rounds
onValue(ref(db, "leaderboard/quizerHistory"), snap => {
  currentHistory = snap.val() || {};
  rebuildDisplay();
});

// ✅ ISOLATED STORAGE STREAM 2: Tracks only active live data matches
onValue(ref(db, "leaderboard/quizer"), snap => {
  currentActive = snap.val() || {};
  rebuildDisplay();
});

// Accurate Sweep Handler Execution
clearBtn.addEventListener("click", async () => {
  if (confirm("Clear current leaderboard, archive results, and drop a red partition line?")) {
    try {
      const activeSnap = await get(ref(db, "leaderboard/quizer"));
      
      if (activeSnap.exists()) {
        const dataToArchive = activeSnap.val();
        const nextTimestampKey = Date.now();
        
        // Step 1: Write directly to history node safely
        await set(ref(db, `leaderboard/quizerHistory/${nextTimestampKey}`), dataToArchive);
      }
      
      // Step 2: Wipe current active records cleanly without feedback triggers looping back
      await remove(ref(db, "leaderboard/quizer"));

      popup.style.display = "block";
      setTimeout(() => { popup.style.display = "none"; }, 1500);

    } catch (err) {
      console.error("Wipe routine failed: ", err);
      alert("Error processing wipe request.");
    }
  }
});
</script>
</body>
</html>
