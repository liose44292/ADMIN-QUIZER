<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel Gateway</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #1a0000 0%, #000000 100%);
    color: #ffffff;
    font-family: 'Segoe UI', Arial, sans-serif;
    box-sizing: border-box;
  }

  .dashboard-container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 30px;
    box-sizing: border-box;
    gap: 25px;
    width: 100%;
  }

  .header-title {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #ffffff;
    text-shadow: 0 0 15px rgba(255, 51, 51, 0.4);
    margin-bottom: 10px;
    text-align: center;
  }

  /* Full-width stretched navigation tile layout rules */
  .stretched-tile {
    width: 100%;
    max-width: 900px; /* Expansive screen coverage across desktop and mobile grid structures */
    box-sizing: border-box;
    padding: 40px 30px;
    background: linear-gradient(135deg, #260808 0%, #0a0000 100%);
    border: 2px solid #4a0d0d;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    box-shadow: 0 8px 25px rgba(0,0,0,0.6);
    position: relative;
    overflow: hidden;
  }

  /* Decorative accent side block */
  .stretched-tile::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: 6px;
    background-color: #ff3333;
    transition: width 0.2s ease;
  }

  .stretched-tile:hover {
    border-color: #ff3333;
    transform: translateY(-3px);
    box-shadow: 0 12px 30px rgba(255, 51, 51, 0.25);
  }

  .stretched-tile:hover::before {
    width: 12px;
  }

  .tile-title {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: 1px;
    color: #ffffff;
    text-transform: uppercase;
    margin: 0 0 8px 0;
  }

  .tile-desc {
    font-size: 15px;
    color: #b3b3b3;
    margin: 0;
    font-weight: 500;
  }

  /* Subtle UI feedback indicator for activation states */
  .stretched-tile:active {
    transform: translateY(1px);
    box-shadow: 0 4px 15px rgba(0,0,0,0.7);
  }
</style>
</head>
<body>

<div class="dashboard-container">
  
  <div class="header-title">Control Center Gateway</div>

  <div class="stretched-tile" onclick="navigateTo('quizmaker.html')">
    <div class="tile-title">Hammer Quiz Engine</div>
    <div class="tile-desc">Configure questions, edit choices, map correct responses, and update active live test pools.</div>
  </div>

  <div class="stretched-tile" onclick="navigateTo('quizeradmin.html')">
    <div class="tile-title">Admin Leaderboard Portal</div>
    <div class="tile-desc">Monitor player scoring ranks in real time, draw layout strike lines, and supervise running matches.</div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCcCjs7M6vFbJzLvYvZfddmEIsCzPPG3jE",
    authDomain: "quizer-project.firebaseapp.com",
    databaseURL: "https://quizer-project-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "quizer-project",
    storageBucket: "quizer-project.firebasestorage.app",
    messagingSenderId: "401652926555",
    appId: "1:401652926555:web:09e9b859638facefcd577e",
    measurementId: "G-D1D4LK2XRT"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Secure baseline view protection
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      location.href = "index.html";
    }
  });

  // Routing Handler
  window.navigateTo = function(targetFile) {
    location.href = targetFile;
  };
</script>
</body>
</html>
