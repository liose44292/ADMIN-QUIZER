<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin View</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        #setup-panel {
            background: #1e1e1e;
            padding: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid #333;
            z-index: 10;
        }
        input {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #222;
            color: white;
            width: 250px;
        }
        button {
            background: #00adb5;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #007c82; }
        
        /* Split view styling: Halved vertically */
        .view-container {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            height: calc(100vh - 75px);
        }
        .video-box {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 2px solid #222;
        }
        .video-box:last-child { border-bottom: none; }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Keeps aspect ratio perfectly */
        }
        .label {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 3px solid #00adb5;
        }
    </style>
</head>
<body>

<div id="setup-panel">
    <input type="text" id="player-id" placeholder="Enter Player Peer ID">
    <button id="connect-btn">View Player</button>
</div>

<div class="view-container">
    <div class="video-box">
        <div class="label">Game / Screen View</div>
        <video id="game-video" autoplay playsinline></video>
    </div>
    
    <div class="video-box">
        <div class="label">Player Selfie View</div>
        <video id="selfie-video" autoplay playsinline></video>
    </div>
</div>

<script>
    const peer = new Peer();

    document.getElementById('connect-btn').addEventListener('click', () => {
        const playerId = document.getElementById('player-id').value.trim();
        if (!playerId) {
            alert("Please enter a valid Player ID.");
            return;
        }

        document.getElementById('connect-btn').innerText = "Connecting...";

        // Call 1: Request the selfie stream
        const selfieCall = peer.call(playerId, null, { metadata: { type: 'selfie' } });
        selfieCall.on('stream', (remoteStream) => {
            document.getElementById('selfie-video').srcObject = remoteStream;
        });

        // Call 2: Request the screen stream
        const screenCall = peer.call(playerId, null, { metadata: { type: 'screen' } });
        screenCall.on('stream', (remoteStream) => {
            document.getElementById('game-video').srcObject = remoteStream;
            document.getElementById('connect-btn').innerText = "Connected";
        });

        // Handle errors or closed connections
        selfieCall.on('close', () => alert("Player disconnected."));
        screenCall.on('close', () => alert("Player disconnected."));
    });
</script>
</body>
</html>
