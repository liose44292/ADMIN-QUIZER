<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Uploaded Audio</title>
<style>
  body { margin: 0; font-family: Arial; background: #013220; color: white; padding: 20px; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .delete-btn { color: red; font-weight: bold; cursor: pointer; font-size: 20px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
  .card { background: #02442A; padding: 20px; border-radius: 8px; text-align: center; cursor: pointer; user-select: none; border: 3px solid transparent; }
  .card.highlighted { border-color: red; background: #500; }
  .zoom-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:200; flex-direction: column; }
  .qa-box { background: rgba(255,255,255,0.1); padding: 15px; margin-top:15px; width:80%; max-height: 40%; overflow-y: auto; display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .popup-controls { width: 80%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .edit-btn { background: #87CEEB; color: black; border: none; padding: 8px 16px; font-weight: bold; cursor: pointer; border-radius: 4px; }
  .close-btn { background: white; color: black; border: none; padding: 8px 16px; font-weight: bold; cursor: pointer; border-radius: 4px; }
  .qa-box input { width: 90%; padding: 5px; border-radius: 4px; border: none; }
</style>
</head>
<body>

<div class="top-bar">
  <h2>AUDIO</h2>
  <div class="delete-btn" id="deleteBtn">DELETE</div>
</div>

<div class="grid" id="mediaGrid"></div>

<div class="zoom-overlay" id="zoomOverlay">
  <div class="popup-controls">
    <button class="close-btn" onclick="closeZoom()">CLOSE</button>
    <button class="edit-btn" id="popupEditBtn">EDIT</button>
  </div>
  <span style="font-size:60px; margin-bottom:10px;">🔊</span>
  <audio id="zoomAudio" controls></audio>
  <div class="qa-box" id="zoomQA"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getDatabase, ref, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCcCjs7M6vFbJzLvYvZfddmEIsCzPPG3jE",
    authDomain: "quizer-project.firebaseapp.com",
    databaseURL: "https://quizer-project-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "quizer-project",
    storageBucket: "quizer-project.firebasestorage.app",
    messagingSenderId: "401652926555",
    appId: "1:401652926555:web:09e9b859638facefcd577e",
    measurementId: "G-D1D4LK2XRT"
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  let selectedId = null;
  let items = {};
  let currentActiveItem = null;
  let currentActiveKey = null;
  let isEditing = false;

  onValue(ref(db, "quizMedia/audio"), (snapshot) => {
    const grid = document.getElementById('mediaGrid');
    grid.innerHTML = '';
    items = snapshot.val() || {};
    for (let key in items) {
      const item = items[key];
      const div = document.createElement('div');
      div.className = 'card';
      div.id = key;
      div.innerHTML = `<div>🔊</div><p>${item.name}</p>`;
      
      let pressTimer;
      div.addEventListener('mousedown', () => { pressTimer = setTimeout(() => toggleHighlight(key), 800); });
      div.addEventListener('mouseup', () => { clearTimeout(pressTimer); });
      div.addEventListener('touchstart', () => { pressTimer = setTimeout(() => toggleHighlight(key), 800); });
      div.addEventListener('touchend', () => { clearTimeout(pressTimer); });
      
      div.onclick = () => {
        if(div.classList.contains('highlighted')) return;
        showZoom(item, key);
      };
      grid.appendChild(div);
    }
  });

  function toggleHighlight(id) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('highlighted'));
    selectedId = (selectedId === id) ? null : id;
    if(selectedId) document.getElementById(id).classList.add('highlighted');
  }

  function showZoom(item, key) {
    currentActiveItem = item;
    currentActiveKey = key;
    isEditing = false;

    const editBtn = document.getElementById('popupEditBtn');
    editBtn.innerText = "EDIT";
    editBtn.style.background = "#87CEEB";

    const audioEl = document.getElementById('zoomAudio');
    audioEl.src = item.data;
    audioEl.play();
    
    renderQA();
    document.getElementById('zoomOverlay').style.display = 'flex';
  }

  function renderQA() {
    const qaBox = document.getElementById('zoomQA');
    qaBox.innerHTML = '';
    
    for (let idx = 0; idx < 10; idx++) {
      let q = currentActiveItem.questions && currentActiveItem.questions[idx] ? currentActiveItem.questions[idx] : "";
      let a = currentActiveItem.answers && currentActiveItem.answers[idx] ? currentActiveItem.answers[idx] : "";
      
      if (isEditing) {
        qaBox.innerHTML += `
          <div><b>Q${idx+1}:</b> <input type="text" id="edit-q-${idx}" value="${q.replace(/"/g, '&quot;')}"></div>
          <div><b>A${idx+1}:</b> <input type="text" id="edit-a-${idx}" value="${a.replace(/"/g, '&quot;')}"></div>
        `;
      } else {
        if (q || a) {
          qaBox.innerHTML += `<div><b>Q${idx+1}:</b> ${q}</div><div><b>A${idx+1}:</b> ${a}</div>`;
        }
      }
    }
  }

  document.getElementById('popupEditBtn').onclick = async () => {
    const editBtn = document.getElementById('popupEditBtn');
    if (!isEditing) {
      isEditing = true;
      editBtn.innerText = "SUBMIT";
      editBtn.style.background = "#90EE90";
      renderQA();
    } else {
      let updatedQuestions = [];
      let updatedAnswers = [];
      for(let idx=0; idx<10; idx++) {
        updatedQuestions.push(document.getElementById(`edit-q-${idx}`).value);
        updatedAnswers.push(document.getElementById(`edit-a-${idx}`).value);
      }
      
      await update(ref(db, `quizMedia/audio/${currentActiveKey}`), {
        questions: updatedQuestions,
        answers: updatedAnswers
      });
      
      alert("Updated successfully!");
      isEditing = false;
      editBtn.innerText = "EDIT";
      editBtn.style.background = "#87CEEB";
      currentActiveItem.questions = updatedQuestions;
      currentActiveItem.answers = updatedAnswers;
      renderQA();
    }
  };

  window.closeZoom = function() {
    document.getElementById('zoomAudio').pause();
    document.getElementById('zoomOverlay').style.display = 'none';
  };

  document.getElementById('deleteBtn').onclick = async () => {
    if(selectedId) {
      await remove(ref(db, "quizMedia/audio/" + selectedId));
      selectedId = null;
      alert("Deleted successfully");
    }
  };
</script>
</body>
</html>
